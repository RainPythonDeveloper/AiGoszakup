services:
  postgres:
    image: postgres:16-alpine
    container_name: goszakup_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-goszakup}
      POSTGRES_USER: ${POSTGRES_USER:-goszakup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./src/db/indexes.sql:/docker-entrypoint-initdb.d/02_indexes.sql
      - ./src/db/views.sql:/docker-entrypoint-initdb.d/03_views.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goszakup} -d ${POSTGRES_DB:-goszakup}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goszakup_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-goszakup}
      POSTGRES_USER: ${POSTGRES_USER:-goszakup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
      GOSZAKUP_API_TOKEN: ${GOSZAKUP_API_TOKEN:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://nitec-ai.kz/api}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-oss-120b}
      APP_PORT: "8000"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
