apiVersion: v1
kind: Secret
metadata:
  name: goszakup-secrets
  namespace: goszakup
  labels:
    app: goszakup
type: Opaque
data:
  # ============================================================
  # WARNING: Replace ALL values below before deploying!
  # These are EMPTY — the app will NOT start without real values.
  #
  # Generate base64 values:
  #   echo -n "your_real_password" | base64
  #
  # Or create the secret directly:
  #   kubectl create secret generic goszakup-secrets \
  #     --from-literal=POSTGRES_PASSWORD=<real_password> \
  #     --from-literal=GOSZAKUP_API_TOKEN=<real_token> \
  #     --from-literal=LLM_API_KEY=<real_key> \
  #     -n goszakup --dry-run=client -o yaml > secret.yaml
  # ============================================================
  POSTGRES_PASSWORD: ""
  GOSZAKUP_API_TOKEN: ""
  LLM_API_KEY: ""
